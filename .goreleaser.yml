version: 2

builds:
  - id: plugin-kit-ai
    dir: cli/plugin-kit-ai
    main: ./cmd/plugin-kit-ai
    binary: plugin-kit-ai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: plugin-kit-ai
    builds:
      - plugin-kit-ai
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-snapshot"
