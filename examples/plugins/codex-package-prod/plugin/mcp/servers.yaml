api_version: v1

servers:
  linear:
    description: Linear issue tracker actions via remote MCP
    type: remote
    remote:
      protocol: sse
      url: "https://mcp.linear.app/mcp"
      headers:
        Authorization: "Bearer ${LINEAR_API_KEY}"
    targets:
      - codex-package

  supabase:
    description: Supabase MCP with optional PAT auth
    type: remote
    remote:
      protocol: sse
      url: "https://mcp.supabase.com/mcp?project_ref=${SUPABASE_PROJECT_REF}"
      headers:
        Authorization: "Bearer ${SUPABASE_ACCESS_TOKEN}"
    targets:
      - codex-package

  playwright:
    description: Browser automation via Playwright MCP server
    type: stdio
    stdio:
      command: npx
      args:
        - -y
        - "@playwright/mcp@0.0.70"
    targets:
      - codex-package
