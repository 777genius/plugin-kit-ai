name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Test (required lane)
        run: make test-required

      - name: Plugin Manifest Workflow
        run: make test-plugin-manifest-workflow

      - name: Vet (all workspace modules)
        run: make vet
