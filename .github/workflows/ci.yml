name: Required

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false

      - name: Run required lane
        run: make test-required

      - name: Plugin Manifest Workflow
        run: make test-plugin-manifest-workflow

      - name: Run vet (all workspace modules)
        run: make vet
