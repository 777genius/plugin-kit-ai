name: Live

on:
  workflow_dispatch:
    inputs:
      notifications_tag:
        description: "Pinned tag for live install smoke"
        required: false
        default: "v1.34.0"
      run_claude_cli:
        description: "Set to 1 to enable Claude live-model sanity"
        required: false
        default: "0"
      claude_model:
        description: "Claude model passed via -claude-model for live sanity"
        required: false
        default: "haiku"

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Run live lane
        env:
          PLUGIN_KIT_AI_E2E_NOTIFICATIONS_TAG: ${{ inputs.notifications_tag }}
          PLUGIN_KIT_AI_RUN_CLAUDE_CLI: ${{ inputs.run_claude_cli }}
        run: |
          {
            make test-live-cli EXTENDED_TEST_ARGS='-args -claude-model=${{ inputs.claude_model }}'
            make test-live
          } 2>&1 | tee live.log

      - name: Upload live log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-log
          path: live.log
