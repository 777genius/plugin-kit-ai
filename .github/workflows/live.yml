name: Live

on:
  workflow_dispatch:
    inputs:
      notifications_tag:
        description: "Pinned tag for live install smoke"
        required: false
        default: "v1.34.0"
      run_homebrew_install:
        description: "Set to 1 to enable macOS Homebrew install smoke for plugin-kit-ai"
        required: false
        default: "0"
      run_npm_install:
        description: "Set to 1 to enable npm install and npx smoke for plugin-kit-ai"
        required: false
        default: "0"
      run_claude_cli:
        description: "Set to 1 to enable Claude live-model sanity"
        required: false
        default: "0"
      claude_model:
        description: "Claude model passed via -claude-model for live sanity"
        required: false
        default: "haiku"

jobs:
  live:
    name: live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Run live evidence lane
        env:
          PLUGIN_KIT_AI_E2E_NOTIFICATIONS_TAG: ${{ inputs.notifications_tag }}
          PLUGIN_KIT_AI_RUN_CLAUDE_CLI: ${{ inputs.run_claude_cli }}
        run: |
          {
            make test-live-cli EXTENDED_TEST_ARGS='-args -claude-model=${{ inputs.claude_model }}'
            make test-live
          } 2>&1 | tee live.log

      - name: Upload live log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-log
          path: live.log

  homebrew-install:
    if: ${{ inputs.run_homebrew_install == '1' }}
    name: homebrew-install
    runs-on: macos-latest
    steps:
      - name: Tap plugin-kit-ai formula
        run: brew tap 777genius/homebrew-plugin-kit-ai

      - name: Install plugin-kit-ai
        run: brew install 777genius/homebrew-plugin-kit-ai/plugin-kit-ai

      - name: Verify plugin-kit-ai version
        run: plugin-kit-ai version

  npm-install:
    if: ${{ inputs.run_npm_install == '1' }}
    name: npm-install
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.notifications_tag }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install plugin-kit-ai via npm
        shell: bash
        run: |
          version="${TAG#v}"
          npm i -g "plugin-kit-ai@${version}"

      - name: Verify global npm install recorded package
        shell: bash
        run: |
          npm list -g plugin-kit-ai --depth=0

      - name: Verify npm exec plugin-kit-ai version
        shell: bash
        run: |
          version="${TAG#v}"
          npm exec --yes --package "plugin-kit-ai@${version}" -- plugin-kit-ai version
