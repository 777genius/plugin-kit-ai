name: Live

on:
  workflow_dispatch:
    inputs:
      notifications_tag:
        description: "Pinned tag for live install smoke"
        required: false
        default: "v1.34.0"
      run_homebrew_install:
        description: "Set to 1 to enable macOS Homebrew install smoke for plugin-kit-ai"
        required: false
        default: "0"
      run_npm_install:
        description: "Set to 1 to enable npm install and npx smoke for plugin-kit-ai"
        required: false
        default: "0"
      run_pipx_install:
        description: "Set to 1 to enable pipx install and pipx run smoke for plugin-kit-ai"
        required: false
        default: "0"
      run_npm_runtime_install:
        description: "Set to 1 to enable npm install smoke for plugin-kit-ai-runtime"
        required: false
        default: "0"
      run_pypi_runtime_install:
        description: "Set to 1 to enable pip install smoke for plugin-kit-ai-runtime"
        required: false
        default: "0"
      run_claude_cli:
        description: "Set to 1 to enable Claude live-model sanity"
        required: false
        default: "0"
      claude_model:
        description: "Claude model passed via -claude-model for live sanity"
        required: false
        default: "haiku"

jobs:
  live:
    name: live
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: false

      - name: Run live evidence lane
        env:
          PLUGIN_KIT_AI_E2E_NOTIFICATIONS_TAG: ${{ inputs.notifications_tag }}
          PLUGIN_KIT_AI_RUN_CLAUDE_CLI: ${{ inputs.run_claude_cli }}
        run: |
          {
            make test-live-cli EXTENDED_TEST_ARGS='-args -claude-model=${{ inputs.claude_model }}'
            make test-live
          } 2>&1 | tee live.log

      - name: Upload live log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: live-log
          path: live.log

  homebrew-install:
    if: ${{ inputs.run_homebrew_install == '1' }}
    name: homebrew-install
    runs-on: macos-latest
    steps:
      - name: Tap plugin-kit-ai formula
        run: brew tap 777genius/homebrew-plugin-kit-ai

      - name: Install plugin-kit-ai
        run: brew install 777genius/homebrew-plugin-kit-ai/plugin-kit-ai

      - name: Verify plugin-kit-ai version
        run: plugin-kit-ai version

  npm-install:
    if: ${{ inputs.run_npm_install == '1' }}
    name: npm-install
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.notifications_tag }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install plugin-kit-ai via npm
        shell: bash
        run: |
          version="${TAG#v}"
          prefix="${RUNNER_TEMP}/plugin-kit-ai-npm"
          rm -rf "${prefix}"
          mkdir -p "${prefix}"
          npm i -g --prefix "${prefix}" "plugin-kit-ai@${version}"
          echo "PLUGIN_KIT_AI_NPM_PREFIX=${prefix}" >> "${GITHUB_ENV}"

      - name: Verify global npm install recorded package
        shell: bash
        run: |
          npm list -g --prefix "${PLUGIN_KIT_AI_NPM_PREFIX}" plugin-kit-ai --depth=0

      - name: Verify installed npm wrapper version
        shell: bash
        run: |
          "${PLUGIN_KIT_AI_NPM_PREFIX}/bin/plugin-kit-ai" version

  pipx-install:
    if: ${{ inputs.run_pipx_install == '1' }}
    name: pipx-install
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.notifications_tag }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pipx
        shell: bash
        run: |
          python3 -m pip install --upgrade pip pipx

      - name: Install plugin-kit-ai via pipx
        shell: bash
        run: |
          version="${TAG#v}"
          export PIPX_HOME="${RUNNER_TEMP}/pipx/home"
          export PIPX_BIN_DIR="${RUNNER_TEMP}/pipx/bin"
          python3 -m pipx install --python "$(command -v python3)" "plugin-kit-ai==${version}"
          echo "PIPX_HOME=${PIPX_HOME}" >> "${GITHUB_ENV}"
          echo "PIPX_BIN_DIR=${PIPX_BIN_DIR}" >> "${GITHUB_ENV}"

      - name: Verify installed pipx package
        shell: bash
        run: |
          python3 -m pipx list
          "${PIPX_BIN_DIR}/plugin-kit-ai" version

      - name: Verify pipx run path
        shell: bash
        run: |
          version="${TAG#v}"
          export PIPX_HOME="${PIPX_HOME}"
          export PIPX_BIN_DIR="${PIPX_BIN_DIR}"
          python3 -m pipx run --spec "plugin-kit-ai==${version}" plugin-kit-ai version

  npm-runtime-install:
    if: ${{ inputs.run_npm_runtime_install == '1' }}
    name: npm-runtime-install
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.notifications_tag }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install plugin-kit-ai-runtime via npm
        shell: bash
        run: |
          version="${TAG#v}"
          project="${RUNNER_TEMP}/plugin-kit-ai-runtime-npm-smoke"
          rm -rf "${project}"
          mkdir -p "${project}"
          cd "${project}"
          npm init -y >/dev/null 2>&1
          npm install "plugin-kit-ai-runtime@${version}"

      - name: Verify npm runtime package import path
        shell: bash
        run: |
          project="${RUNNER_TEMP}/plugin-kit-ai-runtime-npm-smoke"
          cd "${project}"
          node --input-type=module <<'EOF'
          import { CLAUDE_STABLE_HOOKS, CodexApp, continue_ } from "plugin-kit-ai-runtime";
          if (!Array.isArray(CLAUDE_STABLE_HOOKS) || CLAUDE_STABLE_HOOKS.length === 0) {
            throw new Error("CLAUDE_STABLE_HOOKS missing");
          }
          const app = new CodexApp().onNotify(() => continue_());
          if (typeof app.run !== "function") {
            throw new Error("CodexApp.run missing");
          }
          console.log("plugin-kit-ai-runtime npm smoke ok");
          EOF

  pypi-runtime-install:
    if: ${{ inputs.run_pypi_runtime_install == '1' }}
    name: pypi-runtime-install
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.notifications_tag }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install plugin-kit-ai-runtime via pip
        shell: bash
        run: |
          version="${TAG#v}"
          python3 -m pip install --upgrade pip
          python3 -m pip install "plugin-kit-ai-runtime==${version}"

      - name: Verify PyPI runtime package import path
        shell: bash
        run: |
          python3 - <<'PY'
          from plugin_kit_ai_runtime import CLAUDE_STABLE_HOOKS, CodexApp, continue_

          assert CLAUDE_STABLE_HOOKS, "CLAUDE_STABLE_HOOKS missing"
          app = CodexApp()
          app.on_notify(lambda event: continue_())
          assert callable(app.run), "CodexApp.run missing"
          print("plugin-kit-ai-runtime PyPI smoke ok")
          PY
