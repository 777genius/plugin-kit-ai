name: Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published stable tag to sync into the Homebrew tap"
        required: true

jobs:
  update-homebrew-tap:
    if: github.event_name == 'workflow_dispatch' || (github.event.release.prerelease == false && github.event.release.draft == false)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache: false

      - name: Check tap token
        shell: bash
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update 777genius/homebrew-plugin-kit-ai." >&2
            echo "Manual fallback: TAG=${TAG:-${{ github.event.release.tag_name }}} HOMEBREW_TAP_TOKEN=<token> ./scripts/update-homebrew-tap.sh" >&2
            exit 1
          fi
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}

      - name: Update Homebrew tap
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: ./scripts/update-homebrew-tap.sh
