name: PyPI Publish

on:
  workflow_run:
    workflows: ["Release Assets"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published stable tag to publish to PyPI"
        required: true

jobs:
  publish-pypi:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && vars.PYPI_TRUSTED_PUBLISHING_READY == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve stable tag
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            tag="${tag#v}"
            tag="v${tag}"
          else
            git fetch --force --tags origin
            tag="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
          fi
          if [ -z "${tag}" ]; then
            echo "Unable to resolve an exact stable tag for commit $(git rev-parse HEAD)." >&2
            echo "Use workflow_dispatch with an explicit tag as the manual fallback." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Check PyPI trusted publishing readiness
        shell: bash
        env:
          PYPI_TRUSTED_PUBLISHING_READY: ${{ vars.PYPI_TRUSTED_PUBLISHING_READY }}
        run: |
          if [ "${PYPI_TRUSTED_PUBLISHING_READY}" != "true" ]; then
            echo "PYPI_TRUSTED_PUBLISHING_READY must be true before publishing to PyPI." >&2
            exit 1
          fi

      - name: Validate published release assets
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          tag="${TAG#v}"
          tag="v${tag}"
          version="${tag#v}"
          base="https://github.com/777genius/plugin-kit-ai/releases/download/${tag}"
          curl -fsSL "${base}/checksums.txt" -o checksums.txt
          for asset in \
            "plugin-kit-ai_${version}_darwin_amd64.tar.gz" \
            "plugin-kit-ai_${version}_darwin_arm64.tar.gz" \
            "plugin-kit-ai_${version}_linux_amd64.tar.gz" \
            "plugin-kit-ai_${version}_linux_arm64.tar.gz" \
            "plugin-kit-ai_${version}_windows_amd64.tar.gz" \
            "plugin-kit-ai_${version}_windows_arm64.tar.gz"
          do
            grep -q " ${asset}\$" checksums.txt || {
              echo "checksums.txt missing ${asset}" >&2
              exit 1
            }
          done

      - name: Stage PyPI package
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          version="${TAG#v}"
          stage="${RUNNER_TEMP}/plugin-kit-ai-pypi"
          rm -rf "${stage}"
          mkdir -p "${stage}"
          cp -R python/plugin-kit-ai/. "${stage}/"
          python3 - "$stage/src/plugin_kit_ai/__init__.py" "$version" <<'PY'
          from pathlib import Path
          import re
          import sys

          path = Path(sys.argv[1])
          version = sys.argv[2]
          body = path.read_text()
          updated = re.sub(r'__version__ = ".*"', f'__version__ = "{version}"', body, count=1)
          if updated == body:
              raise SystemExit(f"failed to rewrite version in {path}")
          path.write_text(updated)
          PY
          cat "${stage}/pyproject.toml"
          cat "${stage}/src/plugin_kit_ai/__init__.py"

      - name: Build PyPI package
        shell: bash
        working-directory: ${{ runner.temp }}/plugin-kit-ai-pypi
        run: |
          python3 -m pip install --upgrade build
          python3 -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ runner.temp }}/plugin-kit-ai-pypi/dist
