name: Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Annotated stable tag to publish from, for example v1.0.5"
        required: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: false

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/plugin-kit-ai_*
            dist/checksums.txt
