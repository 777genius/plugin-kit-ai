name: Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Annotated stable tag to publish from, for example v1.0.5"
        required: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Validate tag is current main
        shell: bash
        run: |
          git fetch --force origin main:refs/remotes/origin/main
          tag_sha="$(git rev-parse HEAD)"
          main_sha="$(git rev-parse refs/remotes/origin/main)"
          if [ "${tag_sha}" != "${main_sha}" ]; then
            echo "Stable release tags must point at current origin/main." >&2
            echo "Tag ${GITHUB_REF_NAME:-${{ inputs.tag }}} resolves to ${tag_sha}." >&2
            echo "origin/main resolves to ${main_sha}." >&2
            exit 1
          fi

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.10"
          cache: false

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest release artifacts
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/plugin-kit-ai_*
            dist/checksums.txt
