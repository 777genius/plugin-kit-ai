name: Extended

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      run_claude_cli:
        description: "Set to 1 to enable real Claude CLI smoke"
        required: false
        default: "0"
      run_codex_cli:
        description: "Set to 1 to enable real Codex CLI smoke"
        required: false
        default: "0"
      claude_model:
        description: "Claude CLI model passed via -claude-model"
        required: false
        default: "haiku"
      codex_model:
        description: "Codex CLI model passed via -codex-model"
        required: false
        default: "gpt-5.4-mini"

jobs:
  extended:
    name: extended
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false

      - name: Run extended evidence lane
        env:
          PLUGIN_KIT_AI_RUN_CLAUDE_CLI: ${{ inputs.run_claude_cli }}
          PLUGIN_KIT_AI_RUN_CODEX_CLI: ${{ inputs.run_codex_cli }}
        run: |
          make test-extended EXTENDED_TEST_ARGS='-args -claude-model=${{ inputs.claude_model }} -codex-model=${{ inputs.codex_model }}' 2>&1 | tee extended.log

      - name: Upload extended log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extended-log
          path: extended.log
