name: Release Preflight

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Planned stable tag to validate before publication"
        required: true
      require_homebrew:
        description: "Fail when Homebrew tap prerequisites are missing"
        required: false
        default: true
        type: boolean
      require_npm:
        description: "Fail when npm publish prerequisites are missing"
        required: false
        default: true
        type: boolean
      require_pypi:
        description: "Fail when PyPI publish prerequisites are missing"
        required: false
        default: false
        type: boolean

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TAG: ${{ inputs.tag }}
      REQUIRE_HOMEBREW: ${{ inputs.require_homebrew }}
      REQUIRE_NPM: ${{ inputs.require_npm }}
      REQUIRE_PYPI: ${{ inputs.require_pypi }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_PUBLISH_READY: ${{ vars.NPM_PUBLISH_READY }}
      PYPI_TRUSTED_PUBLISHING_READY: ${{ vars.PYPI_TRUSTED_PUBLISHING_READY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release inputs
        shell: bash
        run: |
          tag="${TAG#v}"
          tag="v${tag}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid stable tag format: ${tag}" >&2
            exit 1
          fi
          echo "Validated tag ${tag}"

      - name: Check release metadata and notes hygiene
        shell: bash
        run: |
          test -f LICENSE
          test -f SECURITY.md
          test -f .goreleaser.yml
          test -f docs/RELEASE.md
          test -f docs/RELEASE_CHECKLIST.md
          test -f docs/RELEASE_NOTES_TEMPLATE.md
          if rg -n "to be recorded|TBD|TODO" docs/releases docs/RELEASE_NOTES_TEMPLATE.md docs/REHEARSAL_TEMPLATE.md; then
            echo "release notes still contain unresolved placeholders" >&2
            exit 1
          fi

      - name: Check removed-contract boundary
        shell: bash
        run: bash ./scripts/check-removed-contract-boundary.sh


      - name: Check downstream publish prerequisites
        shell: bash
        run: |
          if [ "${REQUIRE_HOMEBREW}" = "true" ] && [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is required for the Homebrew tap release path." >&2
            exit 1
          fi
          if [ "${REQUIRE_NPM}" = "true" ]; then
            if [ "${NPM_PUBLISH_READY}" != "true" ]; then
              echo "NPM_PUBLISH_READY must be true before requiring the npm release path." >&2
              exit 1
            fi
            if [ -z "${NPM_TOKEN:-}" ]; then
              echo "NPM_TOKEN is required for the npm release path." >&2
              exit 1
            fi
          fi
          if [ "${REQUIRE_PYPI}" = "true" ] && [ "${PYPI_TRUSTED_PUBLISHING_READY}" != "true" ]; then
            echo "PYPI_TRUSTED_PUBLISHING_READY must be true before requiring the PyPI release path." >&2
            exit 1
          fi
