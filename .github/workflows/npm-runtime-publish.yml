name: NPM Runtime Publish

on:
  workflow_run:
    workflows: ["Release Assets"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published stable tag to publish to npm"
        required: true

jobs:
  publish-npm-runtime:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && vars.NPM_PUBLISH_READY == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: "22.21.1"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install npm CLI with trusted publishing support
        shell: bash
        run: |
          npm install -g 'npm@^11.5.1'
          node --version
          npm --version

      - name: Resolve stable tag
        id: release
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            tag="${tag#v}"
            tag="v${tag}"
          else
            git fetch --force --tags origin
            tag="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
          fi
          if [ -z "${tag}" ]; then
            echo "Unable to resolve an exact stable tag for commit $(git rev-parse HEAD)." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Configure npm publish authentication
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLISH_AUTH: ${{ vars.NPM_PUBLISH_AUTH }}
        run: |
          auth="${NPM_PUBLISH_AUTH:-trusted}"
          case "${auth}" in
            trusted)
              echo "Using npm trusted publishing through GitHub OIDC."
              ;;
            token)
              if [ -z "${NPM_TOKEN:-}" ]; then
                echo "NPM_TOKEN is required when NPM_PUBLISH_AUTH=token." >&2
                exit 1
              fi
              printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_TOKEN}" > "${HOME}/.npmrc"
              echo "Using npm token authentication from GitHub Actions secret."
              ;;
            *)
              echo "Unsupported NPM_PUBLISH_AUTH=${auth}; use trusted or token." >&2
              exit 1
              ;;
          esac

      - name: Stage npm runtime package
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          version="${TAG#v}"
          stage="${RUNNER_TEMP}/plugin-kit-ai-runtime-npm"
          rm -rf "${stage}"
          mkdir -p "${stage}"
          cp -R npm/plugin-kit-ai-runtime/. "${stage}/"
          node -e 'const fs=require("fs"); const file=process.argv[1]; const version=process.argv[2]; const pkg=JSON.parse(fs.readFileSync(file,"utf8")); pkg.version=version; fs.writeFileSync(file, JSON.stringify(pkg, null, 2)+"\n");' "${stage}/package.json" "${version}"

      - name: Pack and smoke npm runtime package as a consumer
        shell: bash
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          version="${TAG#v}"
          stage="${RUNNER_TEMP}/plugin-kit-ai-runtime-npm"
          consumer="${RUNNER_TEMP}/plugin-kit-ai-runtime-npm-consumer"
          cd "${stage}"
          pkg_tgz="$(npm pack --silent | tail -n 1)"
          rm -rf "${consumer}"
          mkdir -p "${consumer}"
          cd "${consumer}"
          npm init -y >/dev/null 2>&1
          npm install "${stage}/${pkg_tgz}"
          export RUNTIME_VERSION="${version}"
          node --input-type=module <<'EOF'
          import fs from "node:fs";
          import { CLAUDE_STABLE_HOOKS, CodexApp, continue_ } from "plugin-kit-ai-runtime";

          const pkg = JSON.parse(fs.readFileSync("./node_modules/plugin-kit-ai-runtime/package.json", "utf8"));
          if (pkg.version !== process.env.RUNTIME_VERSION) {
            throw new Error(`unexpected package version ${pkg.version}`);
          }
          if (!Array.isArray(CLAUDE_STABLE_HOOKS) || CLAUDE_STABLE_HOOKS.length === 0) {
            throw new Error("CLAUDE_STABLE_HOOKS missing");
          }
          const app = new CodexApp().onNotify(() => continue_());
          if (typeof app.run !== "function") {
            throw new Error("CodexApp.run missing");
          }
          console.log("plugin-kit-ai-runtime npm prepublish smoke ok");
          EOF

      - name: Publish npm runtime package
        shell: bash
        working-directory: ${{ runner.temp }}/plugin-kit-ai-runtime-npm
        run: npm publish --access public
