name: Runtime Package Registry Smoke

on:
  workflow_run:
    workflows: ["NPM Runtime Publish", "PyPI Runtime Publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Published stable tag to verify from npm/PyPI"
        required: true
      run_npm:
        description: "Set to 1 to run npm registry smoke"
        required: false
        default: "1"
      run_pypi:
        description: "Set to 1 to run PyPI registry smoke"
        required: false
        default: "1"

jobs:
  resolve:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      run_npm: ${{ steps.resolve.outputs.run_npm }}
      run_pypi: ${{ steps.resolve.outputs.run_pypi }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.event.workflow_run.head_sha }}

      - name: Resolve stable tag and runtime channels
        id: resolve
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
            run_npm="${{ inputs.run_npm }}"
            run_pypi="${{ inputs.run_pypi }}"
          else
            git fetch --force --tags origin
            tag="$(git describe --tags --exact-match HEAD 2>/dev/null || true)"
            case "${{ github.event.workflow_run.name }}" in
              "NPM Runtime Publish")
                run_npm="1"
                run_pypi="0"
                ;;
              "PyPI Runtime Publish")
                run_npm="0"
                run_pypi="1"
                ;;
              *)
                echo "unexpected workflow_run source: ${{ github.event.workflow_run.name }}" >&2
                exit 1
                ;;
            esac
          fi
          tag="${tag#v}"
          tag="v${tag}"
          if [ -z "${tag}" ]; then
            echo "Unable to resolve an exact stable tag for runtime package registry smoke." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "run_npm=${run_npm}" >> "${GITHUB_OUTPUT}"
          echo "run_pypi=${run_pypi}" >> "${GITHUB_OUTPUT}"

  npm-runtime-registry-smoke:
    needs: resolve
    if: needs.resolve.outputs.run_npm == '1'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install plugin-kit-ai-runtime from npm registry
        shell: bash
        run: |
          version="${TAG#v}"
          project="${RUNNER_TEMP}/plugin-kit-ai-runtime-npm-postpublish"
          rm -rf "${project}"
          mkdir -p "${project}"
          cd "${project}"
          npm init -y >/dev/null 2>&1
          npm install "plugin-kit-ai-runtime@${version}"

      - name: Verify npm runtime package registry import path
        shell: bash
        run: |
          version="${TAG#v}"
          project="${RUNNER_TEMP}/plugin-kit-ai-runtime-npm-postpublish"
          cd "${project}"
          RUNTIME_VERSION="${version}" node --input-type=module <<'EOF'
          import fs from "node:fs";
          import { CLAUDE_STABLE_HOOKS, CodexApp, continue_ } from "plugin-kit-ai-runtime";

          const pkg = JSON.parse(fs.readFileSync("./node_modules/plugin-kit-ai-runtime/package.json", "utf8"));
          if (pkg.version !== process.env.RUNTIME_VERSION) {
            throw new Error(`unexpected version: ${pkg.version}`);
          }
          if (!Array.isArray(CLAUDE_STABLE_HOOKS) || CLAUDE_STABLE_HOOKS.length === 0) {
            throw new Error("CLAUDE_STABLE_HOOKS missing");
          }
          const app = new CodexApp().onNotify(() => continue_());
          if (typeof app.run !== "function") {
            throw new Error("CodexApp.run missing");
          }
          console.log("plugin-kit-ai-runtime npm postpublish smoke ok");
          EOF

  pypi-runtime-registry-smoke:
    needs: resolve
    if: needs.resolve.outputs.run_pypi == '1'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install plugin-kit-ai-runtime from PyPI
        shell: bash
        run: |
          version="${TAG#v}"
          python3 -m venv "${RUNNER_TEMP}/plugin-kit-ai-runtime-pypi-postpublish"
          source "${RUNNER_TEMP}/plugin-kit-ai-runtime-pypi-postpublish/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install "plugin-kit-ai-runtime==${version}"

      - name: Verify PyPI runtime package registry import path
        shell: bash
        run: |
          version="${TAG#v}"
          source "${RUNNER_TEMP}/plugin-kit-ai-runtime-pypi-postpublish/bin/activate"
          RUNTIME_VERSION="${version}" python - <<'PY'
          import importlib.metadata
          import os
          from plugin_kit_ai_runtime import CLAUDE_STABLE_HOOKS, CodexApp, continue_

          assert importlib.metadata.version("plugin-kit-ai-runtime") == os.environ["RUNTIME_VERSION"]
          assert CLAUDE_STABLE_HOOKS, "CLAUDE_STABLE_HOOKS missing"
          app = CodexApp()
          app.on_notify(lambda event: continue_())
          assert callable(app.run), "CodexApp.run missing"
          print("plugin-kit-ai-runtime PyPI postpublish smoke ok")
          PY
