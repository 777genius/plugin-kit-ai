name: CodeQL

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    - cron: "20 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - uses: actions/checkout@v6

      - if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: false

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: matrix.language == 'go'
        name: Build Go modules for CodeQL
        shell: bash
        run: |
          go build ./...
          (
            cd cli/plugin-kit-ai
            export GOWORK=off
            go build ./...
          )
          (
            cd install/plugininstall
            export GOWORK=off
            go build ./...
          )
          (
            cd install/integrationctl
            export GOWORK=off
            go build ./...
          )
          (
            cd sdk
            export GOWORK=off
            go build ./...
          )

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
